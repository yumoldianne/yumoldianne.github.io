<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · Still building · Dianne Yumol</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:         #ffffff;
      --bg-card:    #f7f7f7;
      --accent:     #2563eb;
      --accent-dim: rgba(37,99,235,0.08);
      --text:       #0a0a0a;
      --text-muted: #6b7280;
      --border:     #e5e7eb;
      --sans:       'DM Sans', system-ui, sans-serif;
      --mono:       'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    /* ── ROBOT ── */
    .robot-wrap {
      width: 180px;
      height: 220px;
      margin-bottom: 2.5rem;
      position: relative;
    }

    /* floating bob */
    .robot-body-group {
      animation: bob 3s ease-in-out infinite;
      transform-origin: center bottom;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* antenna blink */
    .antenna-light {
      animation: blink-light 1.8s ease-in-out infinite;
    }

    @keyframes blink-light {
      0%, 90%, 100% { opacity: 1; }
      45%           { opacity: 0.1; }
    }

    /* eye scan */
    .eye-scan {
      animation: scan 2.4s ease-in-out infinite;
    }

    @keyframes scan {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(4px); }
      75%       { transform: translateX(-4px); }
    }

    /* arm wave */
    .arm-right {
      animation: wave 2s ease-in-out infinite;
      transform-origin: 8px 6px;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(-18deg); }
      75%       { transform: rotate(12deg); }
    }

    /* shadow pulse */
    .robot-shadow {
      animation: shadow-pulse 3s ease-in-out infinite;
      transform-origin: center;
    }

    @keyframes shadow-pulse {
      0%, 100% { transform: scaleX(1); opacity: 0.15; }
      50%       { transform: scaleX(0.75); opacity: 0.08; }
    }

    /* ── TYPOGRAPHY ── */
    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      opacity: 0.6;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
      max-width: 360px;
      line-height: 1.65;
      margin: 0 auto 2rem;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: 260px;
      margin: 0 auto 2.25rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
      opacity: 0.6;
    }

    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      animation: fill-bar 2.5s cubic-bezier(0.4,0,0.2,1) 0.4s forwards;
    }

    @keyframes fill-bar {
      to { width: 38%; }
    }

    /* ── BUTTON ── */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      background: var(--text);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      border-radius: 7px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      margin-bottom: 1rem;
    }

    .btn-home:hover { opacity: 0.82; transform: translateY(-1px); }

    .hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.45;
    }
  </style>
</head>
<body>

  <!-- ── ROBOT SVG ── -->
  <div class="robot-wrap">
    <svg viewBox="0 0 180 220" fill="none" xmlns="http://www.w3.org/2000/svg" width="180" height="220">

      <!-- shadow -->
      <ellipse class="robot-shadow" cx="90" cy="210" rx="48" ry="7" fill="#0a0a0a"/>

      <g class="robot-body-group">

        <!-- ── LEGS ── -->
        <rect x="62" y="168" width="18" height="28" rx="6" fill="#e5e7eb"/>
        <rect x="100" y="168" width="18" height="28" rx="6" fill="#e5e7eb"/>
        <!-- feet -->
        <rect x="57" y="190" width="26" height="10" rx="5" fill="#d1d5db"/>
        <rect x="97" y="190" width="26" height="10" rx="5" fill="#d1d5db"/>

        <!-- ── BODY ── -->
        <rect x="44" y="108" width="92" height="68" rx="14" fill="#f7f7f7" stroke="#e5e7eb" stroke-width="1.5"/>

        <!-- chest panel -->
        <rect x="58" y="122" width="64" height="40" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>

        <!-- chest indicators -->
        <circle cx="74" cy="136" r="5" fill="#2563eb" opacity="0.85"/>
        <circle cx="90" cy="136" r="5" fill="#e5e7eb"/>
        <circle cx="106" cy="136" r="5" fill="#e5e7eb"/>

        <!-- chest bar -->
        <rect x="68" y="148" width="44" height="5" rx="2.5" fill="#e5e7eb"/>
        <rect x="68" y="148" width="20" height="5" rx="2.5" fill="#2563eb" opacity="0.7"/>

        <!-- ── ARMS ── -->
        <!-- left arm (static) -->
        <rect x="18" y="114" width="26" height="14" rx="7" fill="#e5e7eb"/>
        <!-- left hand -->
        <circle cx="15" cy="121" r="7" fill="#d1d5db"/>

        <!-- right arm (waves) -->
        <g class="arm-right" style="transform-origin: 136px 121px;">
          <rect x="136" y="114" width="26" height="14" rx="7" fill="#e5e7eb"/>
          <!-- right hand -->
          <circle cx="165" cy="121" r="7" fill="#d1d5db"/>
        </g>

        <!-- ── HEAD ── -->
        <rect x="50" y="42" width="80" height="70" rx="18" fill="#f7f7f7" stroke="#e5e7eb" stroke-width="1.5"/>

        <!-- ── NECK ── -->
        <rect x="78" y="108" width="24" height="10" rx="4" fill="#e5e7eb"/>

        <!-- ── ANTENNA ── -->
        <rect x="88" y="22" width="4" height="22" rx="2" fill="#d1d5db"/>
        <circle class="antenna-light" cx="90" cy="18" r="7" fill="#2563eb"/>
        <circle cx="90" cy="18" r="4" fill="white" opacity="0.4"/>

        <!-- ── EYES ── -->
        <!-- eye sockets -->
        <rect x="60" y="62" width="24" height="18" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>
        <rect x="96" y="62" width="24" height="18" rx="6" fill="white" stroke="#e5e7eb" stroke-width="1"/>

        <!-- pupils (scan animation) -->
        <g class="eye-scan">
          <circle cx="72" cy="71" r="5" fill="#2563eb"/>
          <circle cx="74" cy="69" r="2" fill="white" opacity="0.5"/>
          <circle cx="108" cy="71" r="5" fill="#2563eb"/>
          <circle cx="110" cy="69" r="2" fill="white" opacity="0.5"/>
        </g>

        <!-- ── MOUTH ── -->
        <!-- friendly smile -->
        <path d="M74 94 Q90 104 106 94" stroke="#d1d5db" stroke-width="2.5" stroke-linecap="round" fill="none"/>

        <!-- cheek blush -->
        <ellipse cx="64" cy="88" rx="6" ry="4" fill="#fca5a5" opacity="0.35"/>
        <ellipse cx="116" cy="88" rx="6" ry="4" fill="#fca5a5" opacity="0.35"/>

      </g>
    </svg>
  </div>

  <!-- ── TEXT ── -->
  <p class="eyebrow">404 · Page not found</p>
  <h1>Still <span>building</span> this one.</h1>
  <p class="subtitle">
    This page is under construction — my robot assistant is working on it.
    Check back soon!
  </p>

  <!-- ── PROGRESS BAR ── -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>progress</span>
      <span>38%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <!-- ── CTA ── -->
  <!-- ✏️ UPDATE: href to your homepage -->
  <a href="index.html" class="btn-home">
    ← Back to homepage
  </a>
  <p class="hint">or just enjoy the robot for a bit</p>

</body>
</html>
